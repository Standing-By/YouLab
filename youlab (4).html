<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>YouLab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');
  :root {
    --bg-deep:#08080d;--bg-surface:#101018;--bg-raised:#181824;--bg-hover:#20202e;
    --border:#2a2a3a;--border-light:#3a3a4e;
    --text-primary:#e8e8f0;--text-secondary:#9090a8;--text-dim:#606078;
    --green-glow:#00e676;--green-dim:#1b5e20;--green-surface:#0a2a12;
    --amber:#ffab00;--amber-dim:#5c4000;--red:#ff3d00;--red-dim:#5c1500;
    --blue:#448aff;--cyan:#00e5ff;--purple:#b388ff;
    --mono:'IBM Plex Mono','SF Mono',monospace;--sans:'IBM Plex Sans',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--sans);background:var(--bg-deep);color:var(--text-primary);height:100vh;display:flex;flex-direction:column;user-select:none;overflow:hidden;}
  #app{display:flex;flex-direction:column;flex:1 1 0;min-height:0;overflow:hidden;}

  /* PERSISTENT YOUTUBE PLAYER BOX - outside #app, never destroyed */
  #ytBox{position:fixed;bottom:4px;left:4px;width:260px;max-height:320px;overflow:hidden;z-index:50;background:#000;border:1px solid #444;border-radius:6px;display:flex;flex-direction:column;}
  #ytBox.no-players{display:none;}
  #ytBoxHeader{display:flex;align-items:center;justify-content:space-between;padding:3px 8px;background:#1a1a2a;font-family:var(--mono);font-size:8px;color:#888;text-transform:uppercase;letter-spacing:1px;cursor:pointer;flex-shrink:0;border-bottom:1px solid #333;}
  #ytBoxHeader:hover{color:#ccc;}
  #ytBoxGrid{display:flex;flex-wrap:wrap;gap:1px;padding:1px;overflow-y:auto;flex:1;min-height:0;}
  #ytBoxGrid::-webkit-scrollbar{width:3px;}#ytBoxGrid::-webkit-scrollbar-thumb{background:#444;border-radius:2px;}
  #ytBox.collapsed #ytBoxGrid{display:none;}
  #ytBox .yt-slot{width:calc(50% - 1px);aspect-ratio:16/9;min-width:120px;min-height:68px;position:relative;background:#111;overflow:hidden;}
  #ytBox .yt-slot iframe{width:100%!important;height:100%!important;border:none!important;}
  #ytBox .yt-label{position:absolute;bottom:0;left:0;right:0;font-family:var(--mono);font-size:7px;color:#999;background:rgba(0,0,0,.8);padding:1px 3px;z-index:5;pointer-events:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* HEADER */
  .header{display:flex;align-items:center;justify-content:space-between;padding:5px 16px;background:var(--bg-surface);border-bottom:1px solid var(--border);flex-shrink:0;height:38px;}
  .header-left{display:flex;align-items:center;gap:14px;}
  .logo{font-family:var(--mono);font-weight:600;font-size:17px;color:var(--green-glow);letter-spacing:2px;}
  .show-name{font-size:13px;background:transparent;border:1px solid transparent;padding:3px 8px;border-radius:4px;font-family:var(--sans);color:var(--text-primary);outline:none;}
  .show-name:hover,.show-name:focus{border-color:var(--border-light);background:var(--bg-raised);}
  .header-actions{display:flex;gap:6px;}
  .btn-s{font-family:var(--mono);font-size:10px;font-weight:500;padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:var(--bg-raised);color:var(--text-secondary);cursor:pointer;transition:all .15s;letter-spacing:.5px;text-transform:uppercase;}
  .btn-s:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-light);}

  /* TRANSPORT */
  .transport-bar{display:flex;align-items:center;gap:8px;padding:6px 16px;background:var(--bg-surface);border-bottom:1px solid var(--border);flex-shrink:0;}
  .btn-go{font-family:var(--mono);font-size:20px;font-weight:700;padding:6px 36px;border:2px solid var(--green-glow);border-radius:8px;background:linear-gradient(180deg,rgba(0,230,118,.15),rgba(0,230,118,.05));color:var(--green-glow);cursor:pointer;transition:all .1s;letter-spacing:4px;text-shadow:0 0 20px rgba(0,230,118,.3);line-height:1;}
  .btn-go:hover{background:linear-gradient(180deg,rgba(0,230,118,.25),rgba(0,230,118,.1));box-shadow:0 0 30px rgba(0,230,118,.15);}
  .btn-go:active{transform:scale(.98);}
  .go-sub{font-family:var(--mono);font-size:9px;color:rgba(0,230,118,.45);margin-left:10px;white-space:nowrap;}
  .btn-t{font-family:var(--mono);font-size:10px;font-weight:600;padding:8px 14px;border-radius:6px;cursor:pointer;transition:all .15s;letter-spacing:.5px;text-transform:uppercase;}
  .btn-stop{border:2px solid var(--red);background:rgba(255,61,0,.08);color:var(--red);}
  .btn-stop:hover{background:rgba(255,61,0,.2);}
  .btn-pause{border:2px solid var(--amber);background:rgba(255,171,0,.06);color:var(--amber);}
  .btn-pause:hover{background:rgba(255,171,0,.15);}
  .btn-fade{border:2px solid var(--purple);background:rgba(179,136,255,.06);color:var(--purple);}
  .btn-fade:hover{background:rgba(179,136,255,.15);}
  .btn-reset{border:2px solid var(--cyan);background:rgba(0,229,255,.06);color:var(--cyan);}
  .btn-reset:hover{background:rgba(0,229,255,.15);}
  .t-spacer{flex:1;}
  .t-keys{font-family:var(--mono);font-size:9px;color:var(--text-dim);}
  kbd{display:inline-block;padding:1px 4px;font-family:var(--mono);font-size:9px;background:var(--bg-deep);border:1px solid var(--border);border-radius:3px;color:var(--text-dim);}

  /* MAIN */
  .main{display:flex;flex:1 1 0;overflow:hidden;min-height:0;}

  /* CUE PANEL */
  .cue-panel{flex:1 1 0;display:flex;flex-direction:column;border-right:1px solid var(--border);min-width:0;min-height:0;}
  .cue-toolbar{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--bg-surface);border-bottom:1px solid var(--border);flex-shrink:0;}
  .cue-toolbar .add-cue{color:var(--green-glow);border-color:var(--green-dim);}
  .cue-toolbar .add-cue:hover{background:var(--green-surface);}
  .clh{display:grid;grid-template-columns:36px 1fr 65px 60px 44px 22px;padding:2px 10px;font-family:var(--mono);font-size:9px;font-weight:500;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;background:var(--bg-surface);border-bottom:1px solid var(--border);flex-shrink:0;}
  .cue-list{flex:1 1 0;overflow-y:auto;overflow-x:hidden;min-height:0;}
  .cue-list::-webkit-scrollbar{width:5px;}
  .cue-list::-webkit-scrollbar-track{background:var(--bg-deep);}
  .cue-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  .cr{display:grid;grid-template-columns:36px 1fr 65px 60px 44px 22px;padding:4px 10px;border-bottom:1px solid #15151f;cursor:pointer;transition:background .1s;align-items:center;min-height:30px;position:relative;}
  .cr:hover{background:var(--bg-hover);}
  .cr.sel{background:var(--bg-raised);outline:1px solid var(--amber-dim);}
  .cr.armed{background:linear-gradient(90deg,var(--green-surface),var(--bg-surface));}
  .cr.armed .cn{color:var(--green-glow);}
  .cr.playing{background:rgba(0,230,118,.08);}
  .cr.dis{opacity:.35;}
  .cn{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text-secondary);}
  .cname{font-size:12px;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:6px;}
  .cname .nm{color:var(--text-dim);font-style:italic;}
  .ct{font-family:var(--mono);font-size:10px;color:var(--text-dim);}
  .cs{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
  .cs.idle{color:var(--text-dim);}.cs.playing{color:var(--green-glow);}.cs.paused{color:var(--blue);}.cs.fading{color:var(--purple);}
  .cf{display:flex;gap:2px;font-family:var(--mono);font-size:8px;}
  .cf .af{color:var(--cyan);}.cf .lp{color:var(--amber);}.cf .dk{color:var(--purple);}
  .cdel{display:flex;align-items:center;justify-content:center;width:18px;height:18px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;border-radius:3px;font-size:13px;opacity:0;transition:all .15s;}
  .cr:hover .cdel{opacity:.6;}
  .cdel:hover{opacity:1!important;color:var(--red);background:rgba(255,61,0,.1);}
  .cpb{position:absolute;bottom:0;left:0;height:2px;background:var(--green-glow);transition:width .2s linear;z-index:2;}

  /* RIGHT PANEL */
  .right-panel{width:340px;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg-surface);overflow:hidden;min-height:0;transition:width .2s;}
  .right-panel.collapsed{width:36px;}
  .insp-hdr{padding:8px 14px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.5px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s;}
  .insp-hdr:hover{color:var(--text-secondary);}
  .insp-hdr .collapse-arrow{font-size:12px;transition:transform .2s;}
  .right-panel.collapsed .insp-hdr{writing-mode:vertical-rl;text-orientation:mixed;padding:14px 8px;letter-spacing:2px;}
  .right-panel.collapsed .insp-hdr .collapse-arrow{transform:rotate(180deg);}
  .right-panel.collapsed .inspector{display:none;}
  .inspector{flex:1 1 0;overflow-y:auto;overflow-x:hidden;min-height:0;}
  .inspector::-webkit-scrollbar{width:4px;}
  .inspector::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  .insp-empty{display:flex;align-items:center;justify-content:center;height:100px;color:var(--text-dim);font-size:12px;font-style:italic;}
  .isec{padding:8px 14px;border-bottom:1px solid var(--border);}
  .ist{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
  .ir{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
  .ir:last-child{margin-bottom:0;}
  .il{font-size:11px;color:var(--text-secondary);width:68px;flex-shrink:0;}
  .ii{flex:1;background:var(--bg-deep);border:1px solid var(--border);border-radius:4px;padding:3px 7px;color:var(--text-primary);font-family:var(--sans);font-size:11px;outline:none;transition:border-color .2s;}
  .ii:focus{border-color:var(--blue);}
  .ii.url{font-family:var(--mono);font-size:10px;}
  .ii[type="number"]{font-family:var(--mono);width:58px;flex:none;}
  .iu{font-family:var(--mono);font-size:9px;color:var(--text-dim);width:14px;}
  .itgl{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:11px;color:var(--text-secondary);}
  .itgl input[type="checkbox"]{display:none;}
  .ttr{width:28px;height:15px;background:var(--bg-deep);border:1px solid var(--border);border-radius:8px;position:relative;transition:all .2s;flex-shrink:0;}
  .ttr::after{content:'';position:absolute;width:9px;height:9px;background:var(--text-dim);border-radius:50%;top:2px;left:2px;transition:all .2s;}
  .itgl input:checked+.ttr{background:var(--green-dim);border-color:var(--green-glow);}
  .itgl input:checked+.ttr::after{left:15px;background:var(--green-glow);}
  .vsc{flex:1;display:flex;align-items:center;gap:6px;}
  input[type="range"]{-webkit-appearance:none;flex:1;height:3px;background:var(--border);border-radius:2px;outline:none;}
  input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--text-primary);cursor:pointer;border:2px solid var(--bg-surface);}
  .vv{font-family:var(--mono);font-size:10px;color:var(--text-secondary);width:32px;text-align:right;}

  /* PRESETS */
  .preset-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
  .preset-btn{font-family:var(--mono);font-size:8px;padding:3px 7px;border:1px solid var(--border);border-radius:3px;background:var(--bg-deep);color:var(--text-dim);cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.3px;}
  .preset-btn:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-light);}
  .preset-btn.active{background:var(--green-surface);color:var(--green-glow);border-color:var(--green-dim);}

  /* BOTTOM */
  .bottom-bar{display:flex;flex-shrink:0;border-top:1px solid var(--border);background:var(--bg-surface);}
  .hits-panel{flex:1;padding:6px 10px;min-width:0;max-height:90px;overflow-y:auto;}
  .hlbl{font-family:var(--mono);font-size:9px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;}
  .hgrid{display:flex;gap:5px;flex-wrap:wrap;}
  .hbtn{width:70px;height:42px;border-radius:5px;border:1px solid var(--border);background:var(--bg-raised);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .1s;position:relative;overflow:hidden;}
  .hbtn:hover{border-color:var(--border-light);background:var(--bg-hover);}
  .hbtn.playing{border-color:var(--green-glow);box-shadow:0 0 10px rgba(0,230,118,.15);}
  .hn{font-size:9px;font-weight:500;color:var(--text-primary);text-align:center;padding:0 3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
  .hcb{position:absolute;top:0;left:0;right:0;height:3px;}

  .mode-tabs{display:flex;gap:0;margin-left:auto;}
  .mt{font-family:var(--mono);font-size:9px;font-weight:600;padding:3px 10px;border:1px solid var(--border);background:var(--bg-deep);color:var(--text-dim);cursor:pointer;letter-spacing:.5px;text-transform:uppercase;transition:all .15s;}
  .mt:first-child{border-radius:3px 0 0 3px;}.mt:last-child{border-radius:0 3px 3px 0;}
  .mt.active{background:var(--bg-raised);color:var(--text-primary);border-color:var(--border-light);}

  .status-bar{display:flex;align-items:center;justify-content:space-between;padding:2px 16px;background:var(--bg-deep);border-top:1px solid var(--border);font-family:var(--mono);font-size:9px;color:var(--text-dim);flex-shrink:0;height:20px;}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;}
  .modal{background:var(--bg-raised);border:1px solid var(--border);border-radius:10px;padding:20px;width:400px;max-width:90vw;}
  .modal h3{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:14px;}
  .modal .ir{margin-bottom:10px;}
  .modal .il{width:65px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:6px;margin-top:16px;}
  .modal-actions .btn-s{padding:6px 14px;font-size:11px;}
  .modal-actions .btn-p{background:var(--green-dim);border-color:var(--green-glow);color:var(--green-glow);}
  .modal-actions .btn-p:hover{background:rgba(0,230,118,.2);}

  /* Server notice */
  .server-notice{background:var(--amber-dim);color:var(--amber);font-family:var(--mono);font-size:10px;padding:4px 16px;text-align:center;display:none;flex-shrink:0;}
  .server-notice.show{display:block;}
  .server-notice code{background:rgba(0,0,0,.3);padding:1px 5px;border-radius:3px;}
</style>
</head>
<body>
<div class="server-notice" id="serverNotice">
  YouLab works best served from a local web server. Open terminal and run: <code>python3 -m http.server 8000</code> then visit <code>http://localhost:8000/youlab.html</code>
</div>
<div id="app"></div>
<div id="ytBox">
  <div id="ytBoxHeader" onclick="document.getElementById('ytBox').classList.toggle('collapsed')">
    <span>Monitors</span><span id="ytToggle">&#9660;</span>
  </div>
  <div id="ytBoxGrid"></div>
</div>

<script>
// Detect file:// and show notice
if(window.location.protocol==='file:'){document.getElementById('serverNotice').classList.add('show');}

var tag=document.createElement('script');tag.src="https://www.youtube.com/iframe_api";
document.head.appendChild(tag);
window._ytReady=false;window._ytCbs=[];
function onYouTubeIframeAPIReady(){window._ytReady=true;window._ytCbs.forEach(cb=>cb());window._ytCbs=[];}
function whenYT(cb){if(window._ytReady)cb();else window._ytCbs.push(cb);}
</script>

<script>
function extractVid(url){if(!url)return null;const p=[/(?:youtube\.com\/watch\?.*v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/|youtube-nocookie\.com\/embed\/)([a-zA-Z0-9_-]{11})/,/^([a-zA-Z0-9_-]{11})$/];for(const r of p){const m=url.match(r);if(m)return m[1];}return null;}
function fmt(s){if(s==null||isNaN(s)||s<0)return'-:--';return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,6);}
function esc(s){const e=document.createElement('span');e.textContent=s||'';return e.innerHTML;}

function makeCue(o){return Object.assign({id:uid(),name:'',url:'',videoId:null,volume:80,fadeIn:0,fadeOut:0,loop:'off',loopCount:0,autoFollow:false,postWait:0,preWait:0,startTime:0,endTime:null,duckOthers:false,duckLevel:50,duckFadeTime:0.5,stopOthers:false,stopOthersFade:0,disabled:false,goAction:'none',goActionFade:5,continuousShow:false,_status:'idle',_duration:0,_currentTime:0},o);}
function makeHit(o){return Object.assign({id:uid(),name:'',url:'',videoId:null,volume:80,color:'#448aff',_status:'idle'},o);}
const HCOLORS=['#448aff','#00e676','#ffab00','#ff3d00','#b388ff','#00e5ff','#ff6090','#69f0ae'];

const S={showName:'Untitled Show',mode:'show',cues:[],hits:[],selId:null,armed:0,inspCollapsed:false,
players:{},hitPlayers:{},ready:{},fades:{},duckingCues:new Set(),preDuck:{},pwTimers:{},progInt:null,continuousShow:false};

// ========== RENDER ==========
function render(){document.getElementById('app').innerHTML=renderApp();bind();ensurePlayers();}

function renderApp(){
  const sel=getSel(),arm=S.cues[S.armed],pc=S.cues.filter(c=>['playing','fading'].includes(c._status)).length;
  return `
  <div class="header"><div class="header-left"><div class="logo">YOULAB</div><input class="show-name" id="sn" value="${esc(S.showName)}" placeholder="Show name..."></div>
  <div class="header-actions"><button class="btn-s" onclick="saveShow()">SAVE</button><button class="btn-s" onclick="loadShow()">LOAD</button><button class="btn-s" onclick="newShow()">NEW</button></div></div>
  <div class="transport-bar">
    <button class="btn-go" onclick="pressGo()">GO</button>
    <span class="go-sub">${arm?esc(arm.name||'Q'+(S.armed+1)):'no cue'}</span>
    <div class="t-spacer"></div>
    <button class="btn-t btn-fade" onclick="fadeAll()">FADE ALL</button>
    <button class="btn-t btn-pause" onclick="togglePause()">${S.cues.some(c=>c._status==='paused')?'RESUME':'PAUSE'}</button>
    <button class="btn-t btn-stop" onclick="stopAll()">&#9632; STOP ALL</button>
    <button class="btn-t btn-reset" onclick="resetShow()">&#8634; RESET</button>
    <div class="t-keys"><kbd>Space</kbd> GO <kbd>Esc</kbd> Stop <kbd>F</kbd> Fade <kbd>P</kbd> Pause <kbd>R</kbd> Reset</div>
  </div>
  <div class="main">
    <div class="cue-panel">
      <div class="cue-toolbar">
        <button class="btn-s add-cue" onclick="addCue()">+ ADD CUE</button>
        <button class="btn-s" onclick="dupeCue()">COPY</button>
        <button class="btn-s" onclick="moveUp()">&#9650;</button>
        <button class="btn-s" onclick="moveDown()">&#9660;</button>
        <div class="mode-tabs">
          <div class="mt ${S.mode==='show'?'active':''}" onclick="setMode('show')">SHOW</div>
          <div class="mt ${S.mode==='edit'?'active':''}" onclick="setMode('edit')">EDIT</div>
        </div>
      </div>
      <div class="clh"><div>Q#</div><div>NAME</div><div>TIME</div><div>STATUS</div><div>FLAGS</div><div></div></div>
      <div class="cue-list" id="cl">${S.cues.map((c,i)=>rCR(c,i)).join('')}${S.cues.length===0?'<div style="padding:30px;text-align:center;color:var(--text-dim);font-size:12px;font-style:italic;">No cues. Click + ADD CUE.</div>':''}</div>
    </div>
    <div class="right-panel${S.inspCollapsed?' collapsed':''}">
      <div class="insp-hdr" onclick="toggleInsp()"><span>CUE INSPECTOR</span><span class="collapse-arrow">${S.inspCollapsed?'&#9664;':'&#9654;'}</span></div>
      <div class="inspector">${sel?rInsp(sel):'<div class="insp-empty">Select a cue to edit</div>'}</div>
    </div>
  </div>
  <div class="bottom-bar"><div class="hits-panel"><div class="hlbl"><span>HIT BUTTONS</span><button class="btn-s" onclick="addHit()" style="font-size:9px;padding:2px 7px;">+ ADD</button></div>
    <div class="hgrid">${S.hits.map(h=>rHit(h)).join('')}${S.hits.length===0?'<div style="color:var(--text-dim);font-size:10px;font-style:italic;padding:3px 0;">No hits yet.</div>':''}</div>
  </div></div>
  <div class="status-bar"><span>${S.cues.length} cue${S.cues.length!==1?'s':''} | ${pc} playing${S.continuousShow?' | CONTINUOUS':''}
  </span><span>YouLab v2</span></div>`;
}

function rCR(c,i){
  let cls='cr';if(c.id===S.selId)cls+=' sel';if(i===S.armed&&S.mode==='show')cls+=' armed';
  if(['playing','fading'].includes(c._status))cls+=' playing';if(c.disabled)cls+=' dis';
  const st=c._status==='prewait'?'WAIT':c._status.toUpperCase();
  const effStart=c.startTime||0;
  const effEnd=c.endTime||c._duration;
  const effDur=effEnd>0?effEnd-effStart:0;
  const effElapsed=Math.max(0,(c._currentTime||0)-effStart);
  const td=['playing','paused','fading'].includes(c._status)?fmt(effElapsed)+'/'+fmt(effDur):(effDur>0?fmt(effDur):'-:--');
  const progPct=effDur>0?(effElapsed/effDur*100).toFixed(1):'0';
  return `<div class="${cls}" onclick="cueClick('${c.id}',${i})" ondblclick="setMode('edit')">
    <div class="cn">${i+1}</div><div class="cname">${c.name?esc(c.name):(c.videoId?esc(c.url.substring(0,30)):'<span class=nm>no media</span>')}</div>
    <div class="ct">${td}</div><div class="cs ${c._status}">${st}</div>
    <div class="cf">${c.autoFollow?'<span class="af">AF</span>':''}${c.loop!=='off'?'<span class="lp">L</span>':''}${c.duckOthers?'<span class="dk">D</span>':''}</div>
    <button class="cdel" onclick="event.stopPropagation();delCue('${c.id}')">&times;</button>
    ${['playing','fading'].includes(c._status)&&effDur>0?`<div class="cpb" style="width:${progPct}%"></div>`:''}</div>`;
}

function rHit(h){return `<div class="hbtn ${h._status==='playing'?'playing':''}" onclick="fireHit('${h.id}')" oncontextmenu="event.preventDefault();editHit('${h.id}');"><div class="hcb" style="background:${h.color}"></div><div class="hn">${h.name?esc(h.name):'...'}</div></div>`;}

// ========== PRESETS ==========
function detectPreset(c){
  if(!c.autoFollow&&!c.loop!=='off'&&c.goAction==='none')return'auto-stop';
  if(c.autoFollow&&c.postWait===0&&c.loop==='off'&&c.goAction==='none')return'auto-follow';
  if(c.autoFollow&&c.postWait<=-3600&&c.loop==='off')return'start-next';
  if(c.loop==='infinite'&&c.goAction==='fade-next')return'loop-go';
  if(c.autoFollow&&c.fadeOut>0&&c.postWait<0)return'crossfade';
  return'';
}
function applyPreset(id){
  const c=getSel();if(!c)return;
  // Reset
  c.autoFollow=false;c.postWait=0;c.loop='off';c.goAction='none';c.goActionFade=5;c.fadeOut=0;
  switch(id){
    case'auto-stop':break;
    case'auto-follow':c.autoFollow=true;break;
    case'start-next':c.autoFollow=true;c.postWait=-3600;break;
    case'loop-go':c.loop='infinite';c.goAction='fade-next';c.goActionFade=5;break;
    case'crossfade':c.autoFollow=true;c.fadeOut=5;c.postWait=-5;break;
  }
  render();
}

// ========== EVENTS ==========
function bind(){
  const sn=document.getElementById('sn');if(sn)sn.addEventListener('change',e=>{S.showName=e.target.value;});
  document.querySelectorAll('[data-f]').forEach(el=>{
    const f=el.dataset.f,ev=el.type==='checkbox'?'change':el.type==='range'?'input':'change';
    el.addEventListener(ev,()=>{
      const c=getSel();if(!c)return;
      let v;if(el.type==='checkbox')v=el.checked;else if(el.type==='number'||el.type==='range')v=el.value===''?null:parseFloat(el.value);else v=el.value;
      c[f]=v;
      if(f==='url'){c.videoId=extractVid(v);if(c.videoId)mkPlayer(c.id,c.videoId);render();return;}
      if(f==='volume'){const p=S.players[c.id];if(p&&S.ready[c.id])p.setVolume(v);const d=el.parentElement.querySelector('.vv');if(d)d.textContent=v+'%';return;}
      if(['duckOthers','stopOthers','autoFollow','loop','disabled','goAction'].includes(f))render();
    });
  });
}

// ========== YOUTUBE ==========
function ensurePlayers(){
  S.cues.forEach(c=>{if(c.videoId&&!S.players[c.id])mkPlayer(c.id,c.videoId);});
  S.hits.forEach(h=>{if(h.videoId&&!S.hitPlayers[h.id])mkHitPlayer(h.id,h.videoId);});
  const box=document.getElementById('ytBox');
  const grid=document.getElementById('ytBoxGrid');
  if(box&&grid){box.classList.toggle('no-players',grid.children.length===0);}
}
function getYTBox(){return document.getElementById('ytBoxGrid');}

function mkPlayer(id,vid){
  whenYT(()=>{
    if(S.players[id]){try{S.players[id].destroy();}catch(e){}delete S.players[id];delete S.ready[id];}
    const box=getYTBox();
    // Remove old slot if exists
    let slot=document.getElementById('yts-'+id);if(slot)slot.remove();
    // Create a visible slot in the persistent box
    slot=document.createElement('div');slot.id='yts-'+id;slot.className='yt-slot';
    const label=document.createElement('div');label.className='yt-label';
    const cue=S.cues.find(c=>c.id===id);
    label.textContent=cue?(cue.name||'Q'+(S.cues.indexOf(cue)+1)):'';
    slot.appendChild(label);
    const pdiv=document.createElement('div');pdiv.id='yt-'+id;pdiv.style.cssText='width:100%;height:100%;';
    slot.appendChild(pdiv);
    box.appendChild(slot);
    S.players[id]=new YT.Player('yt-'+id,{
      width:'100%',height:'100%',
      host:'https://www.youtube-nocookie.com',
      videoId:vid,
      playerVars:{autoplay:0,controls:1,enablejsapi:1,playsinline:1,modestbranding:1,rel:0,fs:0,origin:window.location.origin},
      events:{
        onReady:(ev)=>{S.ready[id]=true;const c=S.cues.find(x=>x.id===id);if(c){c._duration=ev.target.getDuration();}ev.target.setVolume(cue?cue.volume:80);render();},
        onStateChange:(ev)=>{handleSC(id,ev.data);},
        onError:(ev)=>{console.warn('YT err',id,ev.data);const c=S.cues.find(x=>x.id===id);if(c)c._status='idle';
          const m={2:'Invalid video ID',5:'HTML5 error',100:'Not found',101:'Embed blocked',150:'Embed blocked'};
          alert('YouTube: '+(m[ev.data]||'Error '+ev.data)+'\n\nIf running from file://, try a local server:\npython3 -m http.server 8000');render();}
      }
    });
  });
}
function mkHitPlayer(id,vid){
  whenYT(()=>{
    if(S.hitPlayers[id]){try{S.hitPlayers[id].destroy();}catch(e){}delete S.hitPlayers[id];}
    const box=getYTBox();
    let slot=document.getElementById('yts-h-'+id);if(slot)slot.remove();
    slot=document.createElement('div');slot.id='yts-h-'+id;slot.className='yt-slot';
    const pdiv=document.createElement('div');pdiv.id='yt-h-'+id;pdiv.style.cssText='width:100%;height:100%;';
    slot.appendChild(pdiv);box.appendChild(slot);
    S.hitPlayers[id]=new YT.Player('yt-h-'+id,{
      width:'100%',height:'100%',host:'https://www.youtube-nocookie.com',videoId:vid,
      playerVars:{autoplay:0,controls:1,enablejsapi:1,playsinline:1,fs:0,origin:window.location.origin},
      events:{onReady:()=>{S.ready['h-'+id]=true;},onStateChange:(ev)=>{const h=S.hits.find(x=>x.id===id);if(!h)return;if(ev.data===YT.PlayerState.ENDED){h._status='idle';render();}else if(ev.data===YT.PlayerState.PLAYING){h._status='playing';render();}}}
    });
  });
}

// ========== STATE CHANGE ==========
function handleSC(id,st){
  const c=S.cues.find(x=>x.id===id);if(!c)return;const idx=S.cues.indexOf(c);
  if(st===YT.PlayerState.ENDED){
    if(c.loop==='infinite'&&c._status==='playing'){const p=S.players[id];if(p){p.seekTo(c.startTime||0,true);p.playVideo();}return;}
    if(c.loop==='count'&&c._loopsDone<(c.loopCount||2)-1&&c._status==='playing'){c._loopsDone=(c._loopsDone||0)+1;const p=S.players[id];if(p){p.seekTo(c.startTime||0,true);p.playVideo();}return;}
    c._status='idle';c._currentTime=0;c._loopsDone=0;unDuck(id);
    if(c.autoFollow)triggerAF(c,idx);
    if(S.armed<=idx)advArm(idx+1);
    render();
  }else if(st===YT.PlayerState.PLAYING){if(c._status!=='fading')c._status='playing';render();}
}

// ========== CUE ACTIONS ==========
function pressGo(){
  const i=S.armed;if(i<0||i>=S.cues.length)return;
  const c=S.cues[i];
  // Check if cue has a go action pending (it's already playing)
  if(c._status==='playing'&&c.goAction!=='none'){
    executeGoAction(c);
    advArm(i+1);
    return;
  }
  triggerCue(c,i);
}

function executeGoAction(c){
  const p=S.players[c.id];if(!p||!S.ready[c.id])return;
  switch(c.goAction){
    case'exit-loop':c.loop='off';break;// Let it finish naturally
    case'fade-stop':c._status='fading';fadeTo(c.id,p,p.getVolume(),0,c.goActionFade,()=>{p.stopVideo();c._status='idle';c._currentTime=0;unDuck(c.id);render();});break;
    case'fade-next':c._status='fading';fadeTo(c.id,p,p.getVolume(),0,c.goActionFade,()=>{p.stopVideo();c._status='idle';c._currentTime=0;unDuck(c.id);render();});
      const idx=S.cues.indexOf(c);triggerNext(idx);break;
  }
  render();
}

function triggerCue(c,i){
  if(!c||c.disabled){advArm(i+1);return;}
  if(!c.videoId){advArm(i+1);if(c.autoFollow)triggerAF(c,i);return;}
  const p=S.players[c.id];if(!p||!S.ready[c.id])return;
  if(c.stopOthers){S.cues.forEach(x=>{if(x.id!==c.id&&['playing','fading'].includes(x._status)){
    if(c.stopOthersFade>0){x._status='fading';fadeTo(x.id,S.players[x.id],S.players[x.id].getVolume(),0,c.stopOthersFade,()=>{S.players[x.id].stopVideo();x._status='idle';x._currentTime=0;unDuck(x.id);render();});}
    else stopCue(x.id);}});}
  if(c.preWait>0){c._status='prewait';render();S.pwTimers[c.id]=setTimeout(()=>{delete S.pwTimers[c.id];startPlay(c,p);},c.preWait*1000);}
  else startPlay(c,p);
  // Only advance armed if no go action pending
  if(c.goAction==='none')advArm(i+1);
  else{/* Keep armed on this cue so next GO triggers the action */}
}

function startPlay(c,p){
  c._loopsDone=0;c._afFired=false;p.seekTo(c.startTime||0,true);
  p.setVolume(c.fadeIn>0?0:c.volume);
  p.playVideo();c._status='playing';c._duration=p.getDuration();
  if(c.duckOthers)doDuck(c);
  // Delay fade-in slightly so YouTube player is actually playing
  if(c.fadeIn>0){setTimeout(()=>{if(c._status==='playing'){const pl=S.players[c.id];if(pl)fadeTo(c.id,pl,0,c.volume,c.fadeIn);}},150);}
  render();startProg();
}

function triggerAF(c,idx){
  // Auto-follow with post wait
  const pw=c.postWait||0;
  if(pw<=-3600){triggerNext(idx);return;}// Immediately
  if(pw<0){/* Already handled via progress tracking for overlap */triggerNext(idx);return;}
  if(pw>0){setTimeout(()=>triggerNext(idx),pw*1000);return;}
  triggerNext(idx);
}

function stopCue(id){
  const c=S.cues.find(x=>x.id===id);if(!c)return;
  if(S.pwTimers[id]){clearTimeout(S.pwTimers[id]);delete S.pwTimers[id];}
  cancelFade(id);const p=S.players[id];if(p&&S.ready[id])p.stopVideo();
  unDuck(id);c._status='idle';c._currentTime=0;c._loopsDone=0;render();
}
function prevCue(id){
  const c=S.cues.find(x=>x.id===id);if(!c||!c.videoId)return;
  const p=S.players[id];if(!p||!S.ready[id])return;
  p.seekTo(c.startTime||0,true);p.setVolume(c.volume);p.playVideo();
  c._status='playing';c._duration=p.getDuration();render();startProg();
}
function pauseAll(){S.cues.forEach(c=>{if(['playing','fading'].includes(c._status)){const p=S.players[c.id];if(p&&S.ready[c.id])p.pauseVideo();c._status='paused';}});render();}
function resumeAll(){S.cues.forEach(c=>{if(c._status==='paused'){const p=S.players[c.id];if(p&&S.ready[c.id])p.playVideo();c._status='playing';}});render();startProg();}
function togglePause(){S.cues.some(c=>c._status==='paused')?resumeAll():pauseAll();}
function stopAll(){S.cues.forEach(c=>stopCue(c.id));S.hits.forEach(h=>{const p=S.hitPlayers[h.id];if(p){try{p.stopVideo();}catch(e){}}h._status='idle';});render();}
function fadeAll(){
  const dur=5;
  S.cues.forEach(c=>{if(!['playing','fading'].includes(c._status))return;const p=S.players[c.id];if(!p||!S.ready[c.id])return;
    c._status='fading';fadeTo(c.id,p,p.getVolume(),0,dur,()=>{p.stopVideo();c._status='idle';c._currentTime=0;unDuck(c.id);render();});});
  S.hits.forEach(h=>{if(h._status!=='playing')return;const p=S.hitPlayers[h.id];if(!p)return;
    try{const v=p.getVolume();let st=performance.now();const ms=dur*1000;
    function t(){const el=performance.now()-st;const pr=Math.min(el/ms,1);const ea=pr<.5?2*pr*pr:1-Math.pow(-2*pr+2,2)/2;p.setVolume(Math.round(v*(1-ea)));if(pr<1)requestAnimationFrame(t);else{p.stopVideo();h._status='idle';render();}}requestAnimationFrame(t);}catch(e){}});
  render();
}
function triggerNext(ci){let n=ci+1;while(n<S.cues.length&&S.cues[n].disabled)n++;
  if(n>=S.cues.length&&S.continuousShow){n=0;while(n<S.cues.length&&S.cues[n].disabled)n++;}
  if(n<S.cues.length)triggerCue(S.cues[n],n);
}
function advArm(fi){let i=fi;while(i<S.cues.length&&S.cues[i].disabled)i++;
  if(i>=S.cues.length&&S.continuousShow)i=0;
  S.armed=Math.min(i,S.cues.length);
}

// ========== FADE / DUCK ==========
function fadeTo(id,p,from,to,dur,done){cancelFade(id);const st=performance.now(),ms=dur*1000;
  function tick(){const el=performance.now()-st,pr=Math.min(el/ms,1),ea=pr<.5?2*pr*pr:1-Math.pow(-2*pr+2,2)/2;
  try{p.setVolume(Math.round(from+(to-from)*ea));}catch(e){}
  if(pr<1)S.fades[id]={r:requestAnimationFrame(tick)};else{delete S.fades[id];if(done)done();}}
  S.fades[id]={r:requestAnimationFrame(tick)};}
function cancelFade(id){if(S.fades[id]){cancelAnimationFrame(S.fades[id].r);delete S.fades[id];}}
function doDuck(dc){S.duckingCues.add(dc.id);const dt=dc.duckLevel/100;
  S.cues.forEach(c=>{if(c.id===dc.id||!['playing','fading'].includes(c._status))return;const p=S.players[c.id];if(!p||!S.ready[c.id])return;
  if(!S.preDuck[c.id])S.preDuck[c.id]=c.volume;fadeTo(c.id,p,p.getVolume(),Math.round(S.preDuck[c.id]*dt),dc.duckFadeTime||0.5);});}
function unDuck(id){S.duckingCues.delete(id);if(S.duckingCues.size===0){Object.keys(S.preDuck).forEach(i=>{const c=S.cues.find(x=>x.id===i),p=S.players[i];
  if(c&&p&&S.ready[i]&&['playing','fading'].includes(c._status))fadeTo(i,p,p.getVolume(),S.preDuck[i],0.5);});S.preDuck={};}}

// ========== PROGRESS ==========
function startProg(){if(S.progInt)return;S.progInt=setInterval(updateProg,200);}
function updateProg(){
  let any=false;
  S.cues.forEach(c=>{
    if(!['playing','fading','paused'].includes(c._status))return;
    const p=S.players[c.id];if(!p||!S.ready[c.id])return;
    try{c._currentTime=p.getCurrentTime();c._duration=p.getDuration();
    if(c.endTime&&c._currentTime>=c.endTime&&c._status==='playing'){
      if(c.loop==='infinite'){p.seekTo(c.startTime||0,true);}
      else if(c.loop==='count'&&(c._loopsDone||0)<(c.loopCount||2)-1){c._loopsDone=(c._loopsDone||0)+1;p.seekTo(c.startTime||0,true);}
      else if(c.fadeOut>0){c._status='fading';fadeTo(c.id,p,p.getVolume(),0,c.fadeOut,()=>{p.stopVideo();c._status='idle';c._currentTime=0;unDuck(c.id);if(c.autoFollow)triggerAF(c,S.cues.indexOf(c));render();});}
      else{p.stopVideo();c._status='idle';c._currentTime=0;unDuck(c.id);if(c.autoFollow)triggerAF(c,S.cues.indexOf(c));if(S.armed<=S.cues.indexOf(c))advArm(S.cues.indexOf(c)+1);render();}}
    // Fade out near natural end (no custom endTime)
    if(!c.endTime&&c.fadeOut>0&&c._status==='playing'){const tl=c._duration-c._currentTime;if(tl<=c.fadeOut&&tl>0.3){c._status='fading';
      fadeTo(c.id,p,p.getVolume(),0,tl,()=>{p.stopVideo();c._status='idle';c._currentTime=0;unDuck(c.id);if(c.autoFollow)triggerAF(c,S.cues.indexOf(c));if(S.armed<=S.cues.indexOf(c))advArm(S.cues.indexOf(c)+1);render();});}}
    // Negative post wait: trigger next before effective end
    if(c.autoFollow&&c.postWait<0&&c.postWait>-3600&&c._status==='playing'){
      const effEnd=c.endTime||c._duration;const trigAt=effEnd+c.postWait;
      if(c._currentTime>=trigAt&&!c._afFired){c._afFired=true;triggerNext(S.cues.indexOf(c));}}
    }catch(e){}
    if(['playing','fading'].includes(c._status))any=true;
  });
  if(!any){clearInterval(S.progInt);S.progInt=null;}
  // DOM updates
  S.cues.forEach((c,i)=>{const rows=document.querySelectorAll('.cr');if(!rows[i])return;
    const eS=c.startTime||0,eE=c.endTime||c._duration,eD=eE>0?eE-eS:0,eEl=Math.max(0,(c._currentTime||0)-eS);
    const bar=rows[i].querySelector('.cpb');if(bar&&eD>0)bar.style.width=(eEl/eD*100).toFixed(1)+'%';
    const te=rows[i].querySelector('.ct');if(te&&['playing','paused','fading'].includes(c._status))te.textContent=fmt(eEl)+'/'+fmt(eD);});
}

// ========== CUE LIST ==========
function addCue(){const c=makeCue();S.cues.push(c);S.selId=c.id;if(S.mode!=='edit')S.mode='edit';render();}
function delCue(id){stopCue(id);if(S.players[id]){try{S.players[id].destroy();}catch(e){}delete S.players[id];delete S.ready[id];}const slot=document.getElementById('yts-'+id);if(slot)slot.remove();S.cues=S.cues.filter(c=>c.id!==id);if(S.selId===id)S.selId=S.cues.length>0?S.cues[0].id:null;if(S.armed>=S.cues.length)S.armed=Math.max(0,S.cues.length-1);render();}
function dupeCue(){const s=getSel();if(!s)return;const i=S.cues.indexOf(s);const d=makeCue({name:s.name+' (copy)',url:s.url,videoId:s.videoId,volume:s.volume,fadeIn:s.fadeIn,fadeOut:s.fadeOut,loop:s.loop,loopCount:s.loopCount,autoFollow:s.autoFollow,postWait:s.postWait,preWait:s.preWait,startTime:s.startTime,endTime:s.endTime,duckOthers:s.duckOthers,duckLevel:s.duckLevel,stopOthers:s.stopOthers,stopOthersFade:s.stopOthersFade,goAction:s.goAction,goActionFade:s.goActionFade});S.cues.splice(i+1,0,d);S.selId=d.id;if(d.videoId)mkPlayer(d.id,d.videoId);render();}
function moveUp(){const s=getSel();if(!s)return;const i=S.cues.indexOf(s);if(i<=0)return;[S.cues[i-1],S.cues[i]]=[S.cues[i],S.cues[i-1]];render();}
function moveDown(){const s=getSel();if(!s)return;const i=S.cues.indexOf(s);if(i>=S.cues.length-1)return;[S.cues[i],S.cues[i+1]]=[S.cues[i+1],S.cues[i]];render();}
function selCue(id){S.selId=id;render();}
function cueClick(id,idx){S.selId=id;if(S.mode==='show')S.armed=idx;render();}
function getSel(){return S.cues.find(c=>c.id===S.selId);}
function setMode(m){S.mode=m;if(m==='edit')S.inspCollapsed=false;render();}
function toggleInsp(){S.inspCollapsed=!S.inspCollapsed;render();}
function resetShow(){S.armed=0;S.cues.forEach(c=>{c._afFired=false;});render();}

// ========== HITS ==========
function addHit(){const h=makeHit({color:HCOLORS[S.hits.length%HCOLORS.length]});S.hits.push(h);showHitEd(h);}
function fireHit(id){const h=S.hits.find(x=>x.id===id);if(!h)return;if(!h.videoId){editHit(id);return;}const p=S.hitPlayers[id];if(!p||!S.ready['h-'+id])return;if(h._status==='playing'){p.stopVideo();h._status='idle';render();}else{p.seekTo(0,true);p.setVolume(h.volume);p.playVideo();h._status='playing';render();}}
function editHit(id){const h=S.hits.find(x=>x.id===id);if(h)showHitEd(h);}
function showHitEd(h){
  const o=document.createElement('div');o.className='modal-overlay';
  o.innerHTML=`<div class="modal"><h3>EDIT HIT</h3>
    <div class="ir"><div class="il">Name</div><input class="ii" id="hen" value="${esc(h.name)}" placeholder="Hit name"></div>
    <div class="ir"><div class="il">YouTube</div><input class="ii url" id="heu" value="${esc(h.url)}" placeholder="Paste YouTube URL..."></div>
    <div class="ir"><div class="il">Volume</div><div class="vsc"><input type="range" min="0" max="100" value="${h.volume}" id="hev"><div class="vv" id="hevd">${h.volume}%</div></div></div>
    <div class="ir"><div class="il">Color</div><div style="display:flex;gap:5px;">${HCOLORS.map(c=>`<div style="width:22px;height:22px;border-radius:4px;background:${c};cursor:pointer;border:2px solid ${c===h.color?'#fff':'transparent'}" onclick="document.querySelectorAll('[data-hc]').forEach(e=>e.style.borderColor='transparent');this.style.borderColor='#fff';this.dataset.sel='1'" data-hc="${c}"></div>`).join('')}</div></div>
    <div class="modal-actions">
      <button class="btn-s" onclick="delHit('${h.id}');this.closest('.modal-overlay').remove();" style="color:var(--red);border-color:var(--red-dim);">DELETE</button>
      <button class="btn-s" onclick="this.closest('.modal-overlay').remove();">CANCEL</button>
      <button class="btn-s btn-p" onclick="saveHitEd('${h.id}');this.closest('.modal-overlay').remove();">SAVE</button>
    </div></div>`;
  document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)o.remove();});
  o.querySelector('#hev').addEventListener('input',function(){o.querySelector('#hevd').textContent=this.value+'%';});
}
function saveHitEd(id){const h=S.hits.find(x=>x.id===id);if(!h)return;h.name=document.getElementById('hen').value;const u=document.getElementById('heu').value;h.volume=parseInt(document.getElementById('hev').value);const sc=document.querySelector('[data-hc][data-sel="1"]');if(sc)h.color=sc.dataset.hc;if(u!==h.url){h.url=u;h.videoId=extractVid(u);if(h.videoId)mkHitPlayer(h.id,h.videoId);}render();}
function delHit(id){const p=S.hitPlayers[id];if(p){try{p.stopVideo();p.destroy();}catch(e){}delete S.hitPlayers[id];delete S.ready['h-'+id];}const slot=document.getElementById('yts-h-'+id);if(slot)slot.remove();S.hits=S.hits.filter(h=>h.id!==id);render();}

// ========== SAVE/LOAD ==========
function saveShow(){const d={v:2,showName:S.showName,continuousShow:S.continuousShow,cues:S.cues.map(c=>({name:c.name,url:c.url,videoId:c.videoId,volume:c.volume,fadeIn:c.fadeIn,fadeOut:c.fadeOut,loop:c.loop,loopCount:c.loopCount,autoFollow:c.autoFollow,postWait:c.postWait,preWait:c.preWait,startTime:c.startTime,endTime:c.endTime,duckOthers:c.duckOthers,duckLevel:c.duckLevel,duckFadeTime:c.duckFadeTime,stopOthers:c.stopOthers,stopOthersFade:c.stopOthersFade,goAction:c.goAction,goActionFade:c.goActionFade,disabled:c.disabled})),hits:S.hits.map(h=>({name:h.name,url:h.url,videoId:h.videoId,volume:h.volume,color:h.color}))};
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=(S.showName||'untitled')+'.youlab';a.click();URL.revokeObjectURL(u);}
function loadShow(){const i=document.createElement('input');i.type='file';i.accept='.youlab,.json';i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{importShow(JSON.parse(ev.target.result));}catch(err){alert('Error: '+err.message);}};r.readAsText(f);};i.click();}
function importShow(d){stopAll();Object.keys(S.players).forEach(i=>{try{S.players[i].destroy();}catch(e){}});Object.keys(S.hitPlayers).forEach(i=>{try{S.hitPlayers[i].destroy();}catch(e){}});S.players={};S.hitPlayers={};S.ready={};const box=document.getElementById('ytBoxGrid');if(box)box.innerHTML='';S.showName=d.showName||'Untitled Show';S.continuousShow=d.continuousShow||false;S.cues=(d.cues||[]).map(c=>makeCue(c));S.hits=(d.hits||[]).map(h=>makeHit(h));S.selId=S.cues.length>0?S.cues[0].id:null;S.armed=0;render();S.cues.forEach(c=>{if(c.videoId)mkPlayer(c.id,c.videoId);});S.hits.forEach(h=>{if(h.videoId)mkHitPlayer(h.id,h.videoId);});}
function newShow(){if(S.cues.length>0&&!confirm('New show? Unsaved changes lost.'))return;importShow({showName:'Untitled Show',cues:[],hits:[]});}

// ========== KEYBOARD ==========
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT'){if(e.key==='Escape')e.target.blur();return;}
  switch(e.key){case' ':e.preventDefault();pressGo();break;case'Escape':e.preventDefault();stopAll();break;
  case'ArrowUp':e.preventDefault();selPrev();break;case'ArrowDown':e.preventDefault();selNext();break;
  case'p':if(!e.metaKey&&!e.ctrlKey)togglePause();break;case'f':if(!e.metaKey&&!e.ctrlKey)fadeAll();break;case'r':if(!e.metaKey&&!e.ctrlKey)resetShow();break;}
});
function selPrev(){if(!S.selId||S.cues.length===0)return;const i=S.cues.findIndex(c=>c.id===S.selId);if(i>0){S.selId=S.cues[i-1].id;render();}}
function selNext(){if(S.cues.length===0)return;if(!S.selId){S.selId=S.cues[0].id;render();return;}const i=S.cues.findIndex(c=>c.id===S.selId);if(i<S.cues.length-1){S.selId=S.cues[i+1].id;render();}}

render();
</script>
